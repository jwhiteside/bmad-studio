---
name: Shopify Integration Build
id: dept-shopify-integration-build
type: skill
version: 1.0.0
description: >
  Build and configure integrations between platforms in Shopify
  ecosystem. Includes platform setup, API/webhook configuration,
  data mapping, testing, and operational documentation.
category: BMAD/ShopifyEcosystem/Solutioning
tags:
  - integration
  - configuration
  - data-mapping
  - testing
author: BMAD Shopify Ecosystem CoE
created: 2026-04-02
updated: 2026-04-02

inputs:
  - name: integration_spec
    type: document
    required: true
    description: "Integration specification from architecture with data flows and mapping"
  - name: platform_credentials
    type: document
    required: true
    description: "Access credentials and setup information for both platforms"
  - name: test_data
    type: document
    required: false
    description: "Sample data for testing the integration"

outputs:
  - name: integration_configuration
    type: document
    format: markdown
    description: "Integration configuration documentation and operational runbook"

workflow: workflow.md

success_metrics:
  - "Integration configured and tested"
  - "Data mapping complete and validated"
  - "Integration passes all test scenarios"
  - "Runbook documented for operations"

failure_modes:
  - name: "API authentication issues"
    mitigation: "Verify credentials, check vendor documentation, test in sandbox first"
  - name: "Data mapping errors"
    mitigation: "Validate sample data, test transformations, review mapping rules"

roles:
  - name: Integration Engineer
    description: "Builds and configures integrations"
    permissions:
      - configure-integration
      - test-integration
  - name: Data Architect
    description: "Validates data mapping and quality"
    permissions:
      - validate-mapping
      - approve-integration
