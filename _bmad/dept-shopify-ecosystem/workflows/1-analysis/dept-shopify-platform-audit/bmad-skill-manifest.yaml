---
name: Shopify Platform Audit
id: dept-shopify-platform-audit
type: skill
version: 1.0.0
description: >
  Comprehensive health assessment of existing Shopify ecosystem.
  Evaluates integration reliability, identifies anti-patterns,
  reviews costs vs. value, and produces prioritized
  optimization recommendations.
category: BMAD/ShopifyEcosystem/Analysis
tags:
  - audit
  - ecosystem-health
  - integration-assessment
  - cost-optimization
author: BMAD Shopify Ecosystem CoE
created: 2026-04-02
updated: 2026-04-02

inputs:
  - name: platform_inventory
    type: document
    required: true
    description: "Current platform stack with roles, versions, and licensing"
  - name: integration_data
    type: document
    required: false
    description: "Integration logs, sync reports, and error frequency data"
  - name: cost_documentation
    type: document
    required: false
    description: "Platform licensing costs and vendor contracts"
  - name: team_feedback
    type: document
    required: false
    description: "Team feedback on pain points, friction, and satisfaction"

outputs:
  - name: audit_report
    type: document
    format: markdown
    description: "Comprehensive platform audit with health scores, anti-pattern findings, and prioritized recommendations"

workflow: workflow.md

success_metrics:
  - "All active platforms documented with current versions and costs"
  - "Integration health assessed with data where available"
  - "All 6 anti-patterns systematically evaluated"
  - "Cost analysis identifies optimization opportunities"
  - "Recommendations are specific and prioritized by impact"

failure_modes:
  - name: "Integration data not available"
    mitigation: "Conduct integration health interviews with team; observe logs if accessible"
  - name: "Cost documentation incomplete"
    mitigation: "Request current vendor agreements and estimate missing costs"

roles:
  - name: Operations Lead
    description: "Responsible for platform stability and cost management"
    permissions:
      - review-audit
      - approve-recommendations
  - name: Technical Architect
    description: "Validates technical findings and integration health assessment"
    permissions:
      - review-technical-analysis
      - contribute-recommendations
