---
name: Shopify PIM Selection Guide
id: dept-shopify-pim-selection
type: skill
version: 1.0.0
description: >
  Structured decision guide for PIM platform selection in Shopify ecosystem.
  Uses quantitative complexity scoring to evaluate Akeneo, Bluestone, Inriver,
  and skip-PIM approaches. Produces recommendation with integration requirements,
  implementation timeline, and cost analysis.
category: BMAD/ShopifyEcosystem/Analysis
tags:
  - pim
  - platform-selection
  - product-data
  - complexity-scoring
author: BMAD Shopify Ecosystem CoE
created: 2026-04-02
updated: 2026-04-02

inputs:
  - name: product_portfolio
    type: document
    required: true
    description: "Product portfolio context: SKU count, variant depth, channels, enrichment needs"
  - name: data_governance_requirements
    type: document
    required: false
    description: "Data governance, compliance, and localization requirements"
  - name: budget_constraints
    type: document
    required: false
    description: "Budget constraints and timeline expectations"

outputs:
  - name: pim_selection_recommendation
    type: document
    format: markdown
    description: "PIM selection recommendation including complexity score, platform comparison, and implementation plan"

workflow: workflow.md

success_metrics:
  - "PIM complexity score calculated using weighted criteria"
  - "All four options (Akeneo, Bluestone, Inriver, No-PIM) evaluated fairly"
  - "Recommendation aligns with product complexity and business needs"
  - "Implementation timeline realistic based on platform and data volume"

failure_modes:
  - name: "Incomplete product portfolio data"
    mitigation: "Request product data samples and conduct interviews with product/ecommerce teams"
  - name: "Unclear data governance requirements"
    mitigation: "Document governance requirements iteratively through discovery"

roles:
  - name: Product Lead
    description: "Responsible for product data requirements and governance"
    permissions:
      - define-requirements
      - review-complexity-score
  - name: Technical Architect
    description: "Validates integration feasibility of recommended platform"
    permissions:
      - assess-integration-complexity
      - review-technical-fit
