---
name: Shopify Ecosystem Cost Model
id: dept-shopify-cost-model
type: skill
version: 1.0.0
description: >
  Build detailed cost model for Shopify ecosystem implementation
  and operation. Includes platform licensing, integration costs,
  operational expenses, and total cost of ownership analysis.
category: BMAD/ShopifyEcosystem/Planning
tags:
  - cost-modeling
  - financial-planning
  - roi-analysis
  - budgeting
author: BMAD Shopify Ecosystem CoE
created: 2026-04-02
updated: 2026-04-02

inputs:
  - name: platform_selections
    type: document
    required: true
    description: "Platform selections with vendor information and licensing details"
  - name: implementation_plan
    type: document
    required: true
    description: "Implementation plan showing timeline and sequencing"
  - name: scale_requirements
    type: document
    required: false
    description: "Business scale requirements (revenue, transactions, data volume)"

outputs:
  - name: cost_model
    type: document
    format: markdown
    description: "Detailed cost model including licensing, implementation, operations, and TCO"

workflow: workflow.md

success_metrics:
  - "All platform costs documented and validated with vendors"
  - "Implementation costs detailed by phase and platform"
  - "Operational costs realistic and comprehensive"
  - "3-year TCO calculated"
  - "ROI analysis completed"

failure_modes:
  - name: "Incomplete cost information from vendors"
    mitigation: "Request detailed pricing from vendors; estimate based on industry benchmarks"
  - name: "Underestimated implementation effort"
    mitigation: "Validate timelines with implementation partners; add contingency"

roles:
  - name: Finance Lead
    description: "Responsible for cost model and business case"
    permissions:
      - approve-cost-model
      - validate-assumptions
  - name: Project Manager
    description: "Provides implementation cost estimates"
    permissions:
      - estimate-costs
      - identify-cost-drivers
