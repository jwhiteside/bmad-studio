---
name: Shopify Stack Architecture Design
id: dept-shopify-stack-architecture
type: skill
version: 1.0.0
description: >
  Design technical architecture for Shopify ecosystem implementation.
  Selects integration pattern, defines data ownership and customer
  identity strategy, maps data flows, and creates architecture
  decision records for key technical decisions.
category: BMAD/ShopifyEcosystem/Planning
tags:
  - architecture
  - design
  - data-architecture
  - integration-patterns
author: BMAD Shopify Ecosystem CoE
created: 2026-04-02
updated: 2026-04-02

inputs:
  - name: ecosystem_assessment
    type: document
    required: true
    description: "Ecosystem assessment with recommended pattern and platform selections"
  - name: business_requirements
    type: document
    required: false
    description: "Business requirements, integration priorities, and SLAs"
  - name: data_governance
    type: document
    required: false
    description: "Data governance, compliance, and regulatory requirements"

outputs:
  - name: architecture_document
    type: document
    format: markdown
    description: "Architecture design document with patterns, data ownership, flows, and ADRs"

workflow: workflow.md

success_metrics:
  - "Integration pattern selected with clear rationale"
  - "Data ownership defined for all data entities"
  - "Customer identity/resolution strategy documented"
  - "All data flows mapped and designed"
  - "ADRs document key technical decisions"

failure_modes:
  - name: "Conflicting data ownership requirements"
    mitigation: "Facilitate stakeholder alignment on data ownership rules"
  - name: "Incomplete flow specification"
    mitigation: "Interview teams on unmapped data movements"

roles:
  - name: Enterprise Architect
    description: "Owns architecture decisions and validates technical approach"
    permissions:
      - approve-architecture
      - create-adrs
  - name: Data Architect
    description: "Defines data ownership and integration patterns"
    permissions:
      - design-data-architecture
      - specify-flows
