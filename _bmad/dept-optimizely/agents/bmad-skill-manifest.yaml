# BMAD dept-optimizely Agent Manifest
# Defines all 16 specialist agents for Optimizely implementations
# Version: 1.0.0

agents:
  - canonicalId: optimizely-architect
    type: agent
    description: Solutions Architect for Optimizely CMS 12 and SaaS CMS architecture, design patterns, and DXP Cloud strategy

  - canonicalId: optimizely-developer
    type: agent
    description: Backend Developer specialising in Optimizely CMS 12 development, .NET Core, PageData/BlockData, and scheduled jobs

  - canonicalId: saas-developer
    type: agent
    description: SaaS CMS Developer specialising in Visual Builder, Content Graph, headless-first architecture, and SDK/CLI content types

  - canonicalId: front-end-developer
    type: agent
    description: Front End Developer specialising in React/Next.js, headless rendering, Content Graph consumption, and Core Web Vitals

  - canonicalId: content-analyst
    type: agent
    description: Content Analyst specialising in content modelling, governance design, migration analysis, and editorial workflows

  - canonicalId: content-migration
    type: agent
    description: Content Migration Specialist managing end-to-end content migrations from audit through wave execution and validation

  - canonicalId: business-analyst
    type: agent
    description: Business Analyst specialising in requirements gathering, scope management, and authoring experience design

  - canonicalId: project-manager
    type: agent
    description: Project Manager specialising in programme planning, risk management, and multi-workstream delivery coordination

  - canonicalId: qa-engineer
    type: agent
    description: QA Engineer specialising in test strategy, Content Graph validation, and migration verification

  - canonicalId: scrum-master
    type: agent
    description: Scrum Master facilitating agile delivery on Optimizely programmes with velocity tracking and impediment removal

  - canonicalId: devops-engineer
    type: agent
    description: DevOps Engineer specialising in DXP Cloud management, CI/CD pipelines, Docker deployment, and environment promotion

  - canonicalId: performance-optimiser
    type: agent
    description: Performance Optimiser specialising in Core Web Vitals, caching strategy, Content Graph query optimisation, and CDN configuration

  - canonicalId: graph-specialist
    type: agent
    description: Content Graph Specialist managing GraphQL APIs, authentication, cached query templates, and semantic search

  - canonicalId: cmp-specialist
    type: agent
    description: CMP Specialist managing campaign workflows, editorial calendars, approval routing, and marketing operations integration

  - canonicalId: opal-specialist
    type: agent
    description: Opal AI Specialist configuring AI agent orchestration, tools, workflows, and instructions framework

  - canonicalId: commerce-specialist
    type: agent
    description: Commerce Specialist managing catalog, pricing, promotions, order processing, and CMS-Commerce integration

skills:
  - canonicalId: dept-opti-setup
    type: skill
    description: Guided setup for a new Optimizely project. Platform selection, project conventions, reference material configuration, and project context document creation.

  - canonicalId: dept-opti-content-governance
    type: skill
    description: Content governance patterns for Optimizely CMS 12, SaaS CMS, and CMP including editorial workflows, approvals, multi-language governance, and content lifecycle management

  - canonicalId: dept-opti-integration-patterns
    type: skill
    description: Integration architecture patterns for Optimizely including Content Graph, commerce integration, CMP publishing, Opal AI, third-party systems, and DXP Cloud integration

  - canonicalId: dept-opti-testing-strategy
    type: skill
    description: Testing strategy patterns for Optimizely covering CMS 12 backend testing, SaaS CMS validation, front-end testing, content migration validation, performance testing, accessibility, and AI evaluation

  - canonicalId: dept-opti-multi-site
    type: skill
    description: Multi-site and multi-language architecture patterns for Optimizely including site configuration, content organization, translation workflows, regional governance, and multi-market deployment

  - canonicalId: dept-opti-security
    type: skill
    description: Security patterns for Optimizely implementations covering access control, API authentication, data protection, DXP Cloud security, compliance, and OWASP considerations
