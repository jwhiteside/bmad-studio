apiVersion: bmad.optimizely.io/v1alpha1
kind: Skill
metadata:
  name: dept-opti-opal-configure
  namespace: dept-optimizely
  labels:
    phase: solutioning
    platform: saas-cms
    component: ai-agents
spec:
  title: Configure Optimizely Opal AI Agents
  description: Design and deploy AI agents for content generation, translation, personalisation, and workflow automation
  type: skill
  category:
    - ai-workflow
    - content-automation
    - personalization
  cmsTarget:
    - saas-cms
  phase: 3-solutioning
  complexity: medium
  estimatedDuration: "3-5 days"
  author: BMAD CMS Optimizely
  version: "1.0.0"
  inputs:
    - name: workflows-assessment
      type: document
      required: true
      description: Current editorial workflows and pain points
    - name: content-samples
      type: document
      required: false
      description: Example content for RAG training
  outputs:
    - name: agent-designs
      type: document
      description: Agent architecture and configuration specs
    - name: deployed-agents
      type: directory
      description: Agent configurations in Agent Directory
    - name: operational-runbook
      type: document
      description: Agent usage, credit tracking, monitoring
  successCriteria:
    - Use cases identified and prioritized
    - Agents designed and tested
    - Evaluation pass rate >= 80%
    - Agents deployed to production
    - Editorial team trained
  steps:
    - name: step-01-init
      displayName: Requirements Discovery
      description: Identify AI use cases and assess current workflows
    - name: step-02-agent-design
      displayName: Agent Design
      description: Design agents, configure tools, define instructions
    - name: step-03-evaluate-deploy
      displayName: Evaluation and Deployment
      description: Test agents, evaluate performance, deploy to production
  relatedWorkflows:
    - dept-opti-build-component
    - dept-opti-migration-execute
  tags:
    - opal
    - ai-agents
    - content-generation
    - translation
    - personalization
