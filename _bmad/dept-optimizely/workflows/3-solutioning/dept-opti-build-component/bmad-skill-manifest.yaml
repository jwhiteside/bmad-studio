apiVersion: bmad.optimizely.io/v1alpha1
kind: Skill
metadata:
  name: dept-opti-build-component
  namespace: dept-optimizely
  labels:
    phase: solutioning
    platform: optimizely
    component: cms-components
spec:
  title: Build Optimizely Component
  description: Design and implement production-ready CMS components with full test coverage and accessibility compliance
  type: skill
  category:
    - architecture
    - development
    - testing
  cmsTarget:
    - cms12
    - saas-cms
  phase: 3-solutioning
  complexity: medium
  estimatedDuration: "1-3 days"
  author: BMAD CMS Optimizely
  version: "1.0.0"
  inputs:
    - name: component-requirements
      type: document
      required: true
      description: Component specification from requirements gathering
    - name: target-platform
      type: string
      required: true
      description: "CMS 12 or SaaS CMS"
      enum:
        - cms12
        - saas-cms
    - name: design-system
      type: document
      required: false
      description: Design system token and component library reference
  outputs:
    - name: component-specification
      type: document
      description: Final component specification with content model
    - name: implementation-code
      type: repository
      description: Production-ready component code
    - name: test-suite
      type: repository
      description: Unit test suite with coverage report
    - name: accessibility-report
      type: document
      description: WCAG 2.1 AA compliance assessment
  successCriteria:
    - Component deploys without errors
    - Content authoring test succeeds
    - Accessibility tests pass (>= 95%)
    - Test coverage >= 80%
    - Code review sign-off obtained
    - Performance baseline documented
  steps:
    - name: step-01-init
      displayName: Initialize and Requirements Discovery
      description: Discover component requirements and design target platform architecture
    - name: step-02-content-model
      displayName: Design Content Model
      description: Create content model (C# class or SaaS content type) with validation and categories
    - name: step-03-implement
      displayName: Implement Component
      description: Build C#/controller/view or React component with styling and tests
    - name: step-04-test
      displayName: Test and Validation
      description: Execute comprehensive testing and accessibility validation
  relatedWorkflows:
    - dept-opti-requirements
    - dept-opti-headless-implementation
    - dept-opti-code-review
  tags:
    - component-architecture
    - content-modeling
    - wcag-compliance
    - cms-12
    - saas-cms
