---
name: Content Model Design for Optimizely
id: dept-opti-content-model
type: skill
version: 1.0.0
description: >
  Design a CMS-agnostic content model from source content inventory,
  then validate against target Optimizely platform (CMS 12 or SaaS CMS)
  architectural patterns. Produces type definitions, attributes, relationships,
  and validation rules ready for technical implementation.
category: BMAD/Optimizely/Analysis
tags:
  - content-model
  - optimizely
  - content-design
  - cms12
  - saas-cms
  - data-architecture
author: BMAD Migration Practice
created: 2026-03-31
updated: 2026-03-31

# Inputs and outputs
inputs:
  - name: source_content
    type: multiple
    format: "urls, exports, documents, screenshots"
    required: true
    description: "Raw content from source system for analysis"
  - name: source_audit_report
    type: document
    format: markdown_yaml
    required: true
    description: "Content inventory and complexity assessment from source audit"
  - name: target_platform
    type: string
    required: true
    description: "Target platform: 'CMS 12' or 'SaaS CMS'"

outputs:
  - name: content_model_document
    type: document
    format: markdown_yaml
    description: "CMS-agnostic content model with type definitions"
  - name: type_definitions
    type: table
    format: markdown
    description: "Each content type with attributes, validation, relationships"
  - name: platform_validation
    type: document
    format: markdown
    description: "Validation against target platform patterns (PageData/BlockData or Experiences/Sections)"
  - name: source_target_mapping
    type: table
    format: markdown
    description: "Mapping from source types to target content model"
  - name: decisions_document
    type: document
    format: markdown
    description: "Open questions, decisions required, risks"

# Workflow delegation
workflow: workflow.md

# Success metrics
success_metrics:
  - "Content model document created with YAML frontmatter"
  - "All content types defined with attributes and validation rules"
  - "Relationships mapped (references, collections, hierarchies)"
  - "Validated against target platform architecture"
  - "Source-to-target mapping complete"
  - "Open questions and decisions documented"
  - "Model reviewed and approved by stakeholders"

# Failure modes
failure_modes:
  - name: "Source content unclear or fragmented"
    mitigation: "Request complete exports or database dumps; conduct stakeholder interviews"
  - name: "Target platform constraints misunderstood"
    mitigation: "Review platform docs; consult Optimizely architects; run Platform Assessment workflow"
  - name: "Complex relationships prevent clean modelling"
    mitigation: "Document as custom relationship types; flag for technical design phase"
  - name: "Source and target mismatch (no direct mapping)"
    mitigation: "Design transformation rules; gate decision for technical team"

# Roles and permissions
roles:
  - name: Content Architect
    description: "Person designing the content model"
    permissions:
      - parse_source_content
      - design_content_types
      - validate_against_platform
      - coordinate_decisions
