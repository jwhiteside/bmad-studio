---
name: Platform Assessment - CMS 12 vs SaaS CMS
id: dept-opti-platform-assessment
type: skill
version: 1.0.0
description: >
  Assess which Optimizely platform (CMS 12 PaaS or SaaS CMS) is right
  for your project. Covers platform capabilities, cost, team fit, commerce
  integration, and Opal AI opportunities. Produces scoring, comparison matrix,
  and final recommendation with roadmap.
category: BMAD/Optimizely/Analysis
tags:
  - platform-assessment
  - optimizely
  - cms12
  - saas-cms
  - platform-evaluation
  - technology-strategy
author: BMAD Migration Practice
created: 2026-03-31
updated: 2026-03-31

# Inputs and outputs
inputs:
  - name: project_requirements
    type: document
    required: true
    description: "Business goals, technical constraints, team capabilities, timeline, budget"
  - name: source_audit
    type: document
    required: true
    description: "Content inventory and complexity assessment"
  - name: current_technology_stack
    type: string
    required: true
    description: "Current backend (.NET, Java, Node.js, etc.), frontend, integrations"
  - name: team_skills
    type: string
    required: true
    description: "Team expertise (.NET, JavaScript, DevOps, content ops, etc.)"

outputs:
  - name: platform_comparison_matrix
    type: table
    format: markdown
    description: "CMS 12 vs SaaS CMS across 10+ evaluation dimensions"
  - name: scoring_and_recommendation
    type: document
    format: markdown
    description: "Weighted scores, decision factors, final recommendation"
  - name: commerce_assessment
    type: document
    format: markdown
    description: "Commerce integration options and fit for each platform"
  - name: ai_and_cmp_opportunities
    type: document
    format: markdown
    description: "Opal AI, Personalization, and Content Management Platform opportunities"
  - name: risk_register
    type: table
    format: markdown
    description: "Platform-specific risks and mitigation strategies"
  - name: implementation_roadmap
    type: document
    format: markdown
    description: "High-level timeline, phases, and go-live plan"

# Workflow delegation
workflow: workflow.md

# Success metrics
success_metrics:
  - "All project requirements captured and documented"
  - "Platform comparison complete across all dimensions"
  - "Scoring weighted and applied to both platforms"
  - "Commerce fit analysis complete"
  - "AI and CMP opportunities assessed"
  - "Risk register built with mitigations"
  - "Implementation roadmap outlined"
  - "Final recommendation clear with rationale"
  - "Stakeholders understand decision and trade-offs"

# Failure modes
failure_modes:
  - name: "Requirements unclear or conflicting"
    mitigation: "Conduct stakeholder alignment workshop; prioritize requirements"
  - name: "Team skills mismatched to both platforms"
    mitigation: "Plan training or hiring; adjust timeline/budget"
  - name: "Platform choice still unclear after evaluation"
    mitigation: "Run proof-of-concept on both; extend evaluation period"
  - name: "Budget or timeline constraints make recommendation impossible"
    mitigation: "Revisit constraints with leadership; may require phased approach"

# Roles and permissions
roles:
  - name: Platform Decision Maker
    description: "Executive or technical lead making the final decision"
    permissions:
      - gather_requirements
      - evaluate_platforms
      - assess_risks
      - make_final_decision
  - name: Technical Architect
    description: "Person evaluating technical dimensions"
    permissions:
      - analyze_platform_capabilities
      - assess_team_fit
      - evaluate_integrations
