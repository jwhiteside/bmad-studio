apiVersion: bmad.optimizely.io/v1alpha1
kind: Skill
metadata:
  name: dept-opti-migration-execute
  namespace: dept-optimizely
  labels:
    phase: implementation
    platform: optimizely
    component: data-migration
spec:
  title: Execute Content Migration Waves
  description: Migrate legacy content to Optimizely per approved migration plan with validation gates
  type: skill
  category:
    - data-migration
    - content-transfer
    - implementation
  cmsTarget:
    - cms12
    - saas-cms
  phase: 4-implementation
  complexity: high
  estimatedDuration: "1-4 weeks"
  author: BMAD CMS Optimizely
  version: "1.0.0"
  prerequisites:
    - dept-opti-build-component
    - dept-opti-migration-strategy
  inputs:
    - name: migration-plan
      type: document
      required: true
      description: Approved migration waves and schedule
    - name: content-mapping
      type: document
      required: true
      description: Content type and field mappings
    - name: source-content
      type: directory
      required: true
      description: Legacy content export
  outputs:
    - name: migrated-content
      type: directory
      description: Content in target Optimizely environment
    - name: wave-reports
      type: document
      description: Execution tracking per wave
  successCriteria:
    - Wave completion >= 95%
    - Content integrity validation >= 99%
    - Zero unrecovered exceptions
    - Rollback procedures documented
  steps:
    - name: step-01-init
      displayName: Wave Execution Setup
      description: Load plan, verify environment, prepare tracking
    - name: step-02-execute-wave
      displayName: Execute Migration Wave
      description: Transform and load content, validate, gate next wave
  relatedWorkflows:
    - dept-opti-migration-strategy
    - dept-opti-migration-validate
    - dept-opti-code-review
  tags:
    - content-migration
    - data-transformation
    - cms-12
    - saas-cms
