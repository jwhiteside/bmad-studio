---
name: Technical Architecture Design for Optimizely
id: dept-opti-architecture
type: skill
version: 1.0.0
description: >
  Design complete technical architecture for Optimizely implementation (CMS 12 or SaaS CMS)
  using Architecture Decision Records (ADR) format. Covers platform architecture, component model,
  content model, integration patterns, deployment architecture, security, and performance.
category: BMAD/Optimizely/Planning
tags:
  - architecture
  - optimizely
  - adr
  - technical-design
  - solution-architecture
  - cms12
  - saas-cms
author: BMAD Migration Practice
created: 2026-03-31
updated: 2026-03-31

# Inputs and outputs
inputs:
  - name: platform_decision
    type: string
    required: true
    description: "Platform choice: 'CMS 12' or 'SaaS CMS' (from platform assessment)"
  - name: content_model
    type: document
    required: true
    description: "Approved content model with type definitions (from content modelling)"
  - name: project_requirements
    type: document
    required: true
    description: "Business and technical requirements (from platform assessment)"
  - name: integration_requirements
    type: document
    required: true
    description: "List of integrations (Commerce, CRM, Analytics, etc.)"

outputs:
  - name: adr_document
    type: document
    format: markdown_yaml
    description: "Architecture Decision Records documenting all major decisions"
  - name: architecture_diagram
    type: image
    format: diagram
    description: "High-level technical architecture diagram"
  - name: component_model
    type: document
    format: markdown
    description: "CMS types, integrations, deployment components"
  - name: security_architecture
    type: document
    format: markdown
    description: "Security design, authentication, authorization, data protection"
  - name: performance_strategy
    type: document
    format: markdown
    description: "Caching strategy, CDN configuration, query optimization"
  - name: integration_architecture
    type: document
    format: markdown
    description: "API design, webhook patterns, data sync approach"
  - name: deployment_architecture
    type: document
    format: markdown
    description: "Environment setup, CD/CI pipeline, DXP Cloud topology"

# Workflow delegation
workflow: workflow.md

# Success metrics
success_metrics:
  - "Architectural drivers documented and prioritized"
  - "Key architecture decisions recorded in ADR format"
  - "Rationale and trade-offs explained per decision"
  - "Architecture diagram produced"
  - "Component model fully specified"
  - "Integration architecture designed (APIs, webhooks)"
  - "Deployment architecture documented (environments, CD/CI)"
  - "Security strategy defined (auth, authz, data protection)"
  - "Performance strategy defined (caching, CDN, optimization)"
  - "Open questions documented and gated"
  - "Architecture approved and ready for build phase"

# Failure modes
failure_modes:
  - name: "Platform-specific constraints not understood"
    mitigation: "Review platform docs; consult Optimizely solution architect"
  - name: "Integration complexity underestimated"
    mitigation: "Spike on complex integrations; prototype critical path"
  - name: "Architecture doesn't align with content model"
    mitigation: "Validate content model against architecture; iterate"
  - name: "Performance requirements unclear"
    mitigation: "Define SLAs (page load time, throughput); baseline current state"

# Roles and permissions
roles:
  - name: Solution Architect
    description: "Person designing the technical architecture"
    permissions:
      - design_architecture
      - make_technical_decisions
      - document_adr
      - coordinate_with_team
  - name: Platform Specialist
    description: "CMS 12 or SaaS CMS expert advising on platform capabilities"
    permissions:
      - advise_platform_patterns
      - validate_architecture
      - recommend_optimizations
