---
name: Source System Audit for Optimizely Migration
id: dept-opti-source-audit
type: skill
version: 1.0.0
description: >
  Systematically audit a source content management system to establish
  baseline inventory, quality metrics, and complexity tiers for migration
  to Optimizely (CMS 12 or SaaS CMS).
category: BMAD/Optimizely/Analysis
tags:
  - migration
  - audit
  - optimizely
  - cms
  - content-inventory
  - quality-assessment
  - complexity-scoring
author: BMAD Migration Practice
created: 2026-03-31
updated: 2026-03-31

# Inputs and outputs
inputs:
  - name: source_system_access
    type: string
    required: true
    description: "Access credentials or export files from source CMS"
  - name: source_platform
    type: string
    required: true
    description: "Platform type: WordPress, Drupal, Sitecore, AEM, Contentful, custom, etc."
  - name: project_context
    type: string
    required: false
    description: "Project name, goals, timeline, constraints"

outputs:
  - name: source_audit_report
    type: document
    format: markdown_yaml
    description: "Complete audit document with frontmatter and findings"
  - name: content_inventory
    type: table
    format: markdown
    description: "Content types, volumes, languages, asset dependencies"
  - name: quality_scores
    type: table
    format: markdown
    description: "4-tier quality model applied per content type"
  - name: complexity_assessment
    type: table
    format: markdown
    description: "6-dimensional complexity scoring and effort estimates"
  - name: recommendations
    type: document
    format: markdown
    description: "Strategic recommendations for migration approach"

# Workflow delegation
workflow: workflow.md

# Success metrics
success_metrics:
  - "Audit document created with YAML frontmatter"
  - "All content types catalogued with accurate volumes"
  - "Quality scores assigned using 4-tier model"
  - "Complexity tiers calculated across all 6 dimensions"
  - "Effort estimates provided (T-shirt sizing)"
  - "Strategic recommendations documented and presented"

# Failure modes
failure_modes:
  - name: "Cannot access source system"
    mitigation: "Request export files or database backups instead"
  - name: "Platform type unclear"
    mitigation: "Investigate system architecture, database schema, APIs"
  - name: "Content volumes too large to count manually"
    mitigation: "Write database query or API script to count types and totals"
  - name: "Complex content relationships prevent clear typing"
    mitigation: "Document as 'hybrid' types and flag for deep dive in content modelling"

# Roles and permissions
roles:
  - name: Migration Analyst
    description: "Person running this audit"
    permissions:
      - read_source_system
      - create_audit_document
      - coordinate_with_stakeholders
